version: '3.8'

services:
  # PostgreSQL database
  postgres:
    image: postgres:15
    container_name: taskapi-postgres
    environment:
      POSTGRES_DB: taskdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Your Spring Boot app
  app:
    build: .
    container_name: taskapi-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/taskdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATA_MONGODB_URI: mongodb+srv://admin:admin123@cluster0.dj3tgtt.mongodb.net/notesdb
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data: